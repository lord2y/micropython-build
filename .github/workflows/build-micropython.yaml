name: Compile MicroPython with ST7789

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      micropython_version:
        description: 'MicroPython Version Tag'
        required: true
        default: 'v1.28.0'
        type: choice
        options:
          - 'v1.28.0'
          - 'v1.27.0'
          - 'v1.26.0'

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [ESP32_GENERIC, ESP32_GENERIC_S3]

    steps:
      - name: Determine MicroPython Ref Target
        id: get-ref
        run: |
          # Use manual input selection if triggered manually, fallback to default v1.28.0 on push events
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.micropython_version }}" >> $GITHUB_OUTPUT
          else
            echo "version=v1.28.0" >> $GITHUB_OUTPUT
          fi

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git wget flex bison gperf python3 python3-pip python3-venv \
            cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0 pkg-config libreadline-dev

      - name: Checkout Upstream ST7789 C Module
        uses: actions/checkout@v4
        with:
          repository: lord2y/st7789_mpy
          ref: micropython_v1.28.0-attempt2
          path: src-st7789

      - name: Checkout MicroPython Target
        uses: actions/checkout@v4
        with:
          repository: micropython/micropython
          ref: ${{ steps.get-ref.outputs.version }}
          path: src-micropython

      - name: Capture Repository Metadata Tracking Hashes
        id: metadata
        run: |
          # Extract the short 7-character commit hash for the ST7789 driver repo
          cd ${{ github.workspace }}/src-st7789
          ST7789_HASH=$(git rev-parse --short HEAD)
          echo "st7789_sha=${ST7789_HASH}" >> $GITHUB_OUTPUT

          # Extract the short 7-character commit hash for the MicroPython core repo
          cd ${{ github.workspace }}/src-micropython
          MPY_HASH=$(git rev-parse --short HEAD)
          echo "mpy_sha=${MPY_HASH}" >> $GITHUB_OUTPUT

      - name: Fetch and Structurally Link Berkeley DB Submodules
        run: |
          cd src-micropython
          git submodule update --init --recursive --depth 1 --jobs 8
          
          # Clone the flat embedded repository configuration files
          rm -rf lib/berkeley-db-1.xx lib/berkeley-db
          git clone https://github.com/pfalcon/berkeley-db-1.xx -b embedded lib/berkeley-db-1.xx

      - name: Build Cross-Compiler (mpy-cross)
        run: |
          cd src-micropython/mpy-cross
          make -j$(nproc)


      # --- BRANCH TARGET B: HARDWARE ESP32 FIRMWARES ---
      - name: Cache ESP-IDF Toolchain Installation
        if: matrix.target != 'unix'
        id: cache-esp-idf
        uses: actions/cache@v4
        with:
          path: ~/.espressif
          key: esp-idf-v5.3.2-v1

      - name: Set up Espressif ESP-IDF v5.3.2
        if: matrix.target != 'unix'
        run: |
          mkdir -p ~/esp
          cd ~/esp
          git clone -b v5.3.2 --recursive https://github.com/espressif/esp-idf.git
          cd esp-idf
          ./install.sh

      - name: Compile ESP32 Target Firmware
        if: matrix.target != 'unix'
        run: |
          cd ~/esp/esp-idf
          . ./export.sh
          cd ${{ github.workspace }}/src-micropython/ports/esp32
          make -j$(nproc) BOARD=ESP32_GENERIC submodules
          make -j$(nproc) BOARD=${{ matrix.target }} USER_C_MODULES=${{ github.workspace }}/src-st7789/st7789/micropython.cmake
          mkdir -p ${{ github.workspace }}/exports
          cp build-${{ matrix.target }}/firmware.bin ${{ github.workspace }}/exports/firmware-${{ matrix.target }}-${{ steps.get-ref.outputs.version }}.bin

      # --- OUTPUT DISPATCH ARTIFACTS ---
      - name: Upload Compiled Binary Objects
        uses: actions/upload-artifact@v4
        with:
          name: micropython-binaries-${{ matrix.target }}
          path: ${{ github.workspace }}/exports/*

      - name: Create Public Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: "latest-${{ steps.get-ref.outputs.version }}"
          name: "MicroPython ${{ steps.get-ref.outputs.version }} with ST7789"

          body: |
            ### 🛠️ Build Metadata Tracking Info
            This custom firmware compilation package was automatically built using the following repository source code versions:
            * **MicroPython Core**: [`src-micropython@${{ steps.metadata.outputs.mpy_sha }}`](Target Reference: `${{ steps.get-ref.outputs.version }}`)
            * **ST7789 Display Driver**: [`lord2y/st7789_mpy@${{ steps.metadata.outputs.st7789_sha }}`]
            * **Target ESP-IDF Toolchain**: `v5.3.2 stable` (Optimized for legacy ESP32 architecture compatibility)

          prerelease: ${{ github.event.inputs.micropython_version != 'master' }}
          files: ${{ github.workspace }}/exports/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
